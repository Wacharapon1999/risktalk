<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Risk Talk - Gallery Section</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@800;900&family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    padding: 0;
    font-family: 'Figtree', 'Kanit', sans-serif;
    background-color: transparent;
  }

  /* คอนเทนเนอร์หลักสีเขียว #007947 */
  .talk-container {
    background-color: #007947;
    min-height: 400px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 50px 60px;
    box-sizing: border-box;
    overflow: hidden;
    position: relative;
  }

  /* เพิ่มลวดลายพื้นหลังจางๆ ให้ดูมีมิติ */
  .talk-container::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: radial-gradient(circle at 20% 80%, rgba(255,255,255,0.05) 0%, transparent 40%),
                      radial-gradient(circle at 80% 20%, rgba(255,255,255,0.05) 0%, transparent 40%);
  }

  .wrapper {
    max-width: 1200px;
    width: 100%;
    display: flex;
    align-items: center;
    gap: 60px;
    z-index: 1;
  }

  /* --- ฝั่งซ้าย: แกลเลอรีรูปภาพ --- */
  .gallery-side {
    flex: 1.2;
  }

  /* จัดวางรูปภาพแบบ Grid ที่มีการเอียงเล็กน้อย */
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr); /* 3 คอลัมน์ */
    gap: 15px;
    transform: rotate(-3deg) scale(1.05); /* เอียงและขยายเล็กน้อย */
    padding: 20px;
  }

  .photo-item {
    position: relative;
    aspect-ratio: 4 / 3; /* อัตราส่วนภาพ */
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    border: 3px solid rgba(255,255,255,0.1);
  }

  .photo-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.4s ease;
  }

  /* เอฟเฟกต์ตอนชี้เมาส์: รูปเด้งขึ้นมาและหายเอียง */
  .photo-item:hover {
    transform: scale(1.15) rotate(3deg); /* ขยายและหมุนกลับ */
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    z-index: 10; /* ให้รูปที่ชี้อยู่บนสุด */
    border-color: #e31e24; /* เปลี่ยนสีขอบเป็นแดง */
  }
  
  /* --- ฝั่งขวา: ข้อความ --- */
  .text-side {
    flex: 0.8;
    text-align: right; /* จัดชิดขวาตามต้นฉบับ */
    color: white;
    position: relative;
  }

  /* เส้นกราฟิกแนวตั้งด้านขวา */
  .accent-line-box {
    display: inline-block;
    border-right: 8px solid #e31e24; /* เส้นสีแดงหนาขึ้น */
    padding-right: 30px;
  }

  .main-title {
    font-family: 'Figtree', sans-serif;
    font-size: 72px; /* ขนาดใหญ่พิเศษ */
    font-weight: 900;
    color: #e31e24; /* สีแดงตามต้นฉบับ */
    margin: 0;
    line-height: 0.9;
    letter-spacing: -2px;
    text-transform: uppercase;
  }

  .sub-title {
    font-family: 'Kanit', sans-serif;
    font-size: 28px;
    font-weight: 300;
    margin: 10px 0 0 0;
    opacity: 0.9;
  }

  /* Responsive */
  @media (max-width: 950px) {
    .wrapper { flex-direction: column-reverse; gap: 40px; } /* เอารูปไว้ล่างในมือถือ */
    .text-side { text-align: center; }
    .accent-line-box { border-right: none; border-bottom: 6px solid #e31e24; padding-right: 0; padding-bottom: 20px; }
    .gallery-grid { transform: none; /* มือถือไม่ต้องเอียง */ grid-template-columns: repeat(2, 1fr); }
    .main-title { font-size: 50px; }
  }
</style>
</head>
<body>

  <div class="talk-container">
    <div class="wrapper">
      
      <div class="gallery-side">
        <div class="gallery-grid">
            <div class="photo-item"><img src="talk-photo1.png" alt="Risk Talk Activity 1"></div>
            <div class="photo-item"><img src="talk-photo2.png" alt="Risk Talk Activity 2"></div>
            <div class="photo-item"><img src="talk-photo3.png" alt="Risk Talk Activity 3"></div>
            <div class="photo-item"><img src="talk-photo4.png" alt="Risk Talk Activity 4"></div>
            <div class="photo-item"><img src="talk-photo5.png" alt="Risk Talk Activity 5"></div>
            <div class="photo-item"><img src="talk-photo6.png" alt="Risk Talk Activity 6"></div>
        </div>
      </div>

      <div class="text-side">
        <div class="accent-line-box">
            <h1 class="main-title">Risk Talk</h1>
            <p class="sub-title">พูดคุยเรื่องความเสี่ยง</p>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
